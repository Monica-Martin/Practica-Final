<template>
    <lightning-card title="Detalle de Oportunidad">

        <div class={containerClass}>

            <div class="header">
                <h2>{opportunityName}</h2>
            </div>

            <div class="info-grid">

                <div class="field">
                    <span class="label">Estado</span>
                    <span class="value">{stageName}</span>
                </div>

                <div class="field">
                    <span class="label">Importe</span>
                    <span class="value">€ {amount}</span>
                </div>

                <div class="field">
                    <span class="label">Fecha de cierre</span>
                    <span class="value">{closeDate}</span>
                </div>

            </div>

            <div class="actions">
                <lightning-button label={themeLabel} variant="brand" onclick={toggleTheme}>
                </lightning-button>
            </div>

        </div>

    </lightning-card>
</template>
